<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryoTrack — Trust at Every Handoff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['IBM Plex Sans', 'sans-serif'],
              display: ['Oxanium', 'cursive'],
            },
            colors: {
              bg: '#05090F',
              bg2: '#080E18',
              bg3: '#0C1422',
              cyan: '#00E5FF',
              teal: '#00B8A9',
              ice: '#C8F0FF',
              text: '#D6EDF5',
              muted: '#6A8FA3',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --bg: #05090F;
        --bg2: #080E18;
        --bg3: #0C1422;
        --cyan: #00E5FF;
        --teal: #00B8A9;
        --ice: #C8F0FF;
        --text: #D6EDF5;
        --muted: #6A8FA3;
        --border: rgba(0,229,255,0.12);
        --glow: rgba(0,229,255,0.18);
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'IBM Plex Sans', sans-serif;
        overflow-x: hidden;
      }

      /* Background Grid */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0,229,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,229,255,0.035) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: opacity 0.7s ease, transform 0.7s ease;
      }

      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-up {
        animation: fadeUp 0.8s ease both;
      }

      .scroll-mt-header {
        scroll-margin-top: 80px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
